- # ====== Dynamic Action: New_1 ===============================
  id: 33948918161800003
  identification: 
    name: New_1

  execution: 
    sequence: 20
    event-scope: Static
    type: Immediate

  when: 
    event: Click
    selection-type: Button
    button: Group_Above # 33948807941800002

  actions: 
  - # ====== Action: MaxPrint_V2 =================================
    id: 33949099297800004
    identification: 
      action: MaxPrint_V2

    settings: 
      action: Create
      data-source-type: SQL Query
      sql-type: JSON Object SQL
      query: |2
            SELECT json_arrayagg(
                    json_object(
                      'customer_id'       VALUE c.customer_id,
                      'customer_name'     VALUE c.cust_first_name || ' ' || c.cust_last_name,
                      'email'             VALUE c.cust_email,
                      'phone'             VALUE c.phone_number1,
                      'address'       	   VALUE c.cust_street_address1 || ', ' || c.cust_city,
                      'order_id'          VALUE o.order_id,
                      'order_date'        VALUE o.order_timestamp,
                      'order_total'       VALUE o.order_total,
                      'items' VALUE (
                        SELECT json_arrayagg(
                                  json_object(
                                    'order_item_id' VALUE oi.order_item_id,
                                    'product_id'    VALUE p.product_id,
                                    'product_name'  VALUE p.product_name,
                                    'unit_price'    VALUE oi.unit_price,
                                    'quantity'      VALUE oi.quantity,
                                    'line_total'    VALUE (oi.unit_price * oi.quantity)
                                  )
                                  ORDER BY oi.order_item_id
                                  RETURNING CLOB
                                )
                        FROM demo_order_items oi
                        JOIN demo_product_info p 
                          ON oi.product_id = p.product_id
                        WHERE oi.order_id = o.order_id
                      )
                      RETURNING CLOB
                    )
                    RETURNING CLOB
                  ) AS customer_invoices
            FROM demo_customers c
            JOIN demo_orders o
              ON c.customer_id = o.customer_id
            WHERE EXISTS (SELECT 1 
                            FROM demo_order_items oi 
                          WHERE oi.order_id = o.order_id);

    execution: 
      sequence: 10
      event: New_1 # 33948918161800003
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

- # ====== Dynamic Action: New_2 ===============================
  id: 33949285499800006
  identification: 
    name: New_2

  execution: 
    sequence: 30
    event-scope: Static
    type: Immediate

  when: 
    event: Click
    selection-type: Button
    button: Cross_Tab # 33949156753800005

  actions: 
  - # ====== Action: MaxPrint_V2 =================================
    id: 33949300274800007
    identification: 
      action: MaxPrint_V2

    settings: 
      action: Create
      data-source-type: SQL Query
      sql-type: JSON Object SQL
      query: |
        SELECT 
        JSON_OBJECT(
          'columns' VALUE (
            SELECT JSON_ARRAYAGG(JOB_TITLE ORDER BY JOB_TITLE)
            FROM (
              SELECT DISTINCT j.JOB_TITLE
              FROM employees e, jobs j
              WHERE e.job_id = j.Job_id
              ORDER BY j.JOB_TITLE
              FETCH FIRST 5 ROWS ONLY
            )
          ),
          'data' VALUE (
            SELECT JSON_ARRAYAGG(
              JSON_OBJECT(
                'Department' VALUE d.DEPARTMENT_NAME,
                'rows' VALUE (
                  SELECT JSON_ARRAYAGG(
                    COALESCE(emp_count, 0) ORDER BY j.JOB_TITLE
                  )
                  FROM (
                    SELECT DISTINCT j.JOB_TITLE
                    FROM jobs j
                    ORDER BY j.JOB_TITLE
                    FETCH FIRST 5 ROWS ONLY
        
                  ) j
                  LEFT JOIN (
                    SELECT e.job_id, COUNT(*) as emp_count
                    FROM employees e
                    WHERE e.DEPARTMENT_ID = d.DEPARTMENT_ID
                    GROUP BY e.job_id
                  ) e ON j.JOB_TITLE = (SELECT JOB_TITLE FROM jobs WHERE job_id = e.job_id FETCH FIRST 5 ROWS ONLY)
                )
              ) ORDER BY d.DEPARTMENT_NAME
            )
            FROM DEPARTMENTS d
          )
        ) AS json_output
        FROM DUAL;

    execution: 
      sequence: 10
      event: New_2 # 33949285499800006
      fire-when-event-result-is: True
      fire-on-initialization: false
      stop-execution-on-error: true
      wait-for-result: true

