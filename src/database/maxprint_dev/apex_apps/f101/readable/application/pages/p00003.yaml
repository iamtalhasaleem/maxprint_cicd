      query: |
        SELECT product_id,
               product_name,
               product_description,
               CATEGORY,
               list_price,
               apex_web_service.blob2clobbase64 (PRODUCT_IMAGE) PRODUCT_IMAGE
        FROM demo_product_info
        WHERE category = :P3_CATEGORY;
