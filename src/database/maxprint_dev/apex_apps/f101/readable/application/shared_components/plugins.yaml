  - # ====== Custom Attribute: PLSQL Code ========================
    id: 2331347101206381060
    identification: 
      attribute: 4
      name: PLSQL Code
      scope: Component

    layout: 
      sequence: 40

    settings: 
      type: PL/SQL Function Body Returning VARCHAR2
      common: true
      show-in-wizard: true
      required: true
      translatable: false

    condition: 
      depending-on-custom-attribute: Data Source Type # 2331341414476338829
      depending-on-condition-type: in list
      expression: FRS
      always-evaluate: true

    examples: 
      examples: |
        <b> Function Returning Sql </b>   
        <pre>
        Decalre 
        v_sql clob := 'SELECT json_arrayagg(json_object(''department_name'' value d.department_name,
                            ''department_number'' value d.department_id,
                            ''employees'' value (select json_arrayagg(
                                                        json_object(''employee_number'' value e.employee_id,
                                                        ''employee_name'' value e.first_name || '' '' || e.last_name,
                                                        ''salary'' value e.salary,
                                                        ''email'' value e.email,
                                                        ''phone_number'' value e.phone_number,
                                                        ''hire_date'' value e.hire_date) returning clob)
                                                from hr.employees e
                                                where e.department_id = d.department_id
                                                ) returning clob) returning clob
                                                ) result
        
        FROM hr.departments d
        ORDER BY d.department_name'
        Begin
        return v_sql;
        End;
        </pre>
        
        <b>OR</b>
        
        <pre>
        Decalre 
        v_sql clob := 'SELECT d.department_name AS "department_name",   
                       d.department_id AS "department_number",   
                       CURSOR(SELECT e.employee_id AS "employee_number",   
                                 e.first_name||chr(39)||e.last_name AS "employee_name",   
                                 e.salary,   
                                 e.email,   
                                 e.phone_number,   
                                 e.hire_date   
                          FROM   hr.employees e   
                          WHERE  e.department_id = d.department_id   
                          ORDER BY e.employee_id) AS "employees"   
            FROM   hr.departments d   
            ORDER BY d.department_name';
        Begin
        return v_sql;
        End;
        </pre>
        
        <b>OR</b>
        
        <pre>
        Begin
        return somefunction(:a,:b,:c);
        End;
        </pre>

  - # ====== Custom Attribute: Query =============================
    id: 2331348698910392035
    identification: 
      attribute: 5
      name: Query
      scope: Component

    layout: 
      sequence: 50

    settings: 
      type: SQL Query
      common: true
      show-in-wizard: true
      required: true
      translatable: false
      minimum-columns: 1

    condition: 
      depending-on-custom-attribute: Data Source Type # 2331341414476338829
      depending-on-condition-type: equal to
      expression: SQL
      always-evaluate: true

    examples: 
      examples: |
        <b> JSON Object Sql </b>   
        <pre>SELECT json_arrayagg(json_object('department_name' value d.department_name,
                            'department_number' value d.department_id,
                            'employees' value (select json_arrayagg(
                                                        json_object('employee_number' value e.employee_id,
                                                        'employee_name' value e.first_name || ' ' || e.last_name,
                                                        'salary' value e.salary,
                                                        'email' value e.email,
                                                        'phone_number' value e.phone_number,
                                                        'hire_date' value e.hire_date) returning clob)
                                                from hr.employees e
                                                where e.department_id = d.department_id
                                                order by e.employee_id) returning clob) returning clob
                                                ) result
        
        FROM hr.departments d
        ORDER BY d.department_name    </pre>
        <b> Cursor Sql </b>   
        <pre>SELECT d.department_name AS "department_name",   
                       d.department_id AS "department_number",   
                       CURSOR(SELECT e.employee_id AS "employee_number",   
                                 e.first_name||' '||e.last_name AS "employee_name",   
                                 e.salary,   
                                 e.email,   
                                 e.phone_number,   
                                 e.hire_date   
                          FROM   hr.employees e   
                          WHERE  e.department_id = d.department_id   
                          ORDER BY e.employee_id) AS "employees"   
            FROM   hr.departments d   
            ORDER BY d.department_name    </pre>
        <b> Simple Sql </b>  
         <pre>SELECT d.department_name AS "department_name",   
                        d.department_id AS "department_number",   
                       e.employee_id AS "employee_number",   
                       e.first_name || ' ' || e.last_name AS "employee_name",   
                       e.salary,   
                       e.email,   
                       e.phone_number,   
                       e.hire_date   
           FROM hr.departments d, hr.employees e   
          WHERE e.department_id = d.department_id   
          ORDER BY d.department_name, e.employee_id    </pre>
        
        <b>master columns = </b> department_name , department_number

